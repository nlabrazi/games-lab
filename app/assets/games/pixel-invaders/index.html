<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>⚡ PIXEL INVADERS - Space Shooter Rétro</title>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #03050b 0%, #0a0f1f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'VT323', monospace;
      margin: 0;
      padding: 20px;
    }

    .game-container {
      background: #000000aa;
      border-radius: 32px;
      padding: 20px 20px 24px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(2px);
    }

    canvas {
      display: block;
      margin: 0 auto;
      box-shadow: 0 0 0 4px #3e3f5e, 0 10px 25px rgba(0, 0, 0, 0.5);
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      image-rendering: pixelated;
      cursor: default;
    }

    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 18px;
      gap: 20px;
      flex-wrap: wrap;
      background: #010008aa;
      padding: 12px 20px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      font-weight: bold;
      border: 1px solid #33ffcc44;
    }

    .score-box,
    .high-box,
    .level-box {
      background: #000000aa;
      padding: 6px 16px;
      border-radius: 2rem;
      font-size: 1.5rem;
      letter-spacing: 1px;
      font-family: 'Courier New', monospace;
    }

    .score-box span,
    .high-box span,
    .level-box span {
      color: #99ffe0;
      text-shadow: 0 0 3px #0ff;
    }

    .score-box div,
    .high-box div,
    .level-box div {
      color: #f0ff70;
      font-size: 1.8rem;
      font-weight: bold;
      display: inline-block;
      margin-left: 12px;
      text-shadow: 0 0 5px #ffcc33;
    }

    .restart-btn {
      background: #1f2a3e;
      border: none;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 6px 20px;
      border-radius: 40px;
      color: #f0e6d0;
      cursor: pointer;
      transition: 0.1s linear;
      box-shadow: 0 3px 0 #0a0e1a;
    }

    .restart-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #0a0e1a;
    }

    .pause-btn {
      background: #183944;
    }

    .controls-tip {
      font-size: 0.75rem;
      background: #00000099;
      padding: 4px 12px;
      border-radius: 20px;
      color: #bbffdd;
    }

    @media (max-width: 550px) {

      .score-box div,
      .high-box div,
      .level-box div {
        font-size: 1.2rem;
      }

      .score-box,
      .high-box,
      .level-box {
        font-size: 1rem;
        padding: 4px 12px;
      }

      .info-panel {
        gap: 8px;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div>
    <div class="game-container">
      <canvas id="gameCanvas" width="800" height="550"></canvas>
      <div class="info-panel">
        <div class="score-box">🔫 SCORE <span>★</span>
          <div id="scoreValue">0</div>
        </div>
        <div class="high-box">🏆 HIGH SCORE <span>⚡</span>
          <div id="highScoreValue">0</div>
        </div>
        <div class="level-box">🌌 WAVE <span>🌀</span>
          <div id="levelValue">1</div>
        </div>
        <button class="restart-btn" id="restartButton">🔄 RESTART</button>
        <button class="restart-btn pause-btn" id="pauseButton">⏸ PAUSE</button>
        <div class="controls-tip">◀ ▶ [ESPACE] ou ▲ pour TIRER · [P] ou [ECHAP] PAUSE</div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // ---------- CANVAS ----------
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');

      // Dimensions fixes pixel art
      const W = 800;
      const H = 550;

      // ---------- PARAMÈTRES JEU ----------
      let gameRunning = true;
      let isPaused = false;
      let score = 0;
      let highScore = 0;
      let wave = 1;            // niveau actuel (augmente progressivement)

      // Facteur de difficulté (multiplicateur spawn, vitesse, cadence)
      let difficultyFactor = 1.0;

      // Entités
      let player = { x: W / 2, y: H - 55, width: 28, height: 24, speed: 6 };
      let lasers = [];         // { x, y, w, h }
      let invaders = [];
      let explosions = [];      // { x, y, timer }

      // timer pour cadence tir joueur (cooldown)
      let shotCooldown = 0;
      const SHOT_DELAY_FRAMES = 12;  // nombre de frames entre deux tirs

      // Paramètres envahisseurs
      let invaderDirection = 1;   // 1 = droite, -1 = gauche
      let invaderStepY = 0;       // incrément Y quand descente
      let invaderMoveCounter = 0;
      let invaderMoveInterval = 30; // sera modifié par difficulté (base 30)

      // compteur pour spawn aléatoire progressif (parfois génère un envahisseur supplémentaire)
      let extraSpawnTimer = 0;

      // gestion game over restart
      let requestId = null;
      const pauseButton = document.getElementById('pauseButton');

      // ---------- HIGHSCORE (stockage local storage) ----------
      function loadHighScore() {
        try {
          const stored = localStorage.getItem("pixelInvadersHighScore");
          if (stored !== null && !isNaN(parseInt(stored))) {
            highScore = parseInt(stored);
          } else {
            highScore = 0;
          }
        } catch (e) { highScore = 0; }
        document.getElementById('highScoreValue').innerText = highScore;
      }

      function saveHighScore() {
        if (score > highScore) {
          highScore = score;
          localStorage.setItem("pixelInvadersHighScore", highScore);
          document.getElementById('highScoreValue').innerText = highScore;
        }
      }

      function updateScoreUI() {
        document.getElementById('scoreValue').innerText = score;
        document.getElementById('levelValue').innerText = wave;
        if (score > highScore) {
          document.getElementById('highScoreValue').innerText = score;
        } else {
          document.getElementById('highScoreValue').innerText = highScore;
        }
      }

      // ---------- initialisation ou reset complet ----------
      function initGame() {
        gameRunning = true;
        setPaused(false);
        score = 0;
        wave = 1;
        difficultyFactor = 1.0;
        invaderMoveInterval = Math.max(18, Math.floor(30 / Math.min(2.2, difficultyFactor))); // base 30
        invaderDirection = 1;
        invaderStepY = 0;
        invaderMoveCounter = 0;
        shotCooldown = 0;
        lasers = [];
        explosions = [];

        // position joueur
        player.x = W / 2 - player.width / 2;
        player.y = H - 55;

        // génération vague initiale (10 ennemis classiques)
        generateWave();

        updateScoreUI();
        saveHighScore(); // pour affichage clean
      }

      // génère les envahisseurs basés sur le wave actuel (difficulté, nombre, résistance)
      function generateWave() {
        invaders = [];
        // base 8 ennemis + bonus selon wave (max 20 ennemis)
        let baseCount = Math.min(24, 8 + Math.floor(wave / 3));
        // plus la vague est haute, plus on spawn d'ennemis
        let enemyCount = Math.min(28, baseCount);

        const startX = 70;
        const startY = 55;
        const cols = Math.min(8, Math.ceil(enemyCount / 3));
        const rows = Math.ceil(enemyCount / cols);

        let index = 0;
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            if (index >= enemyCount) break;
            let enemyType = "normal";
            // A partir du wave 3, on introduit quelques variantes (points bonus)
            let hp = 1;
            let points = 100;
            let color = "#ff3a6f";
            // difficulté : plus le wave est haut, plus on mélange des types costauds
            if (wave >= 3 && Math.random() < 0.2 + (wave / 50)) {
              hp = 2;
              points = 250;
              color = "#ffaa44";
              enemyType = "armored";
            }
            if (wave >= 6 && Math.random() < 0.15) {
              hp = 3;
              points = 500;
              color = "#dd44ff";
              enemyType = "elite";
            }
            invaders.push({
              x: startX + col * 68,
              y: startY + row * 48,
              w: 34,
              h: 28,
              hp: hp,
              maxHp: hp,
              points: points,
              color: color,
              type: enemyType
            });
            index++;
          }
        }

        // ajuster la vitesse de déplacement en fonction de la difficulté et wave
        let speedBase = Math.max(14, 28 - Math.floor(wave / 2));
        invaderMoveInterval = Math.max(12, Math.floor(30 / (0.8 + wave * 0.05)));
        // plus il y a d'ennemis restants, plus le mouvement peut être un peu ralenti, mais la difficulté compense
      }

      // fonction pour augmenter la vague progressivement (appelé quand tous les envahisseurs sont morts)
      function advanceWave() {
        wave++;
        // facteur de difficulté globale
        difficultyFactor = 1 + (wave - 1) * 0.12;
        // augmenter vitesse déplacement ennemis (frame interval)
        invaderMoveInterval = Math.max(10, Math.floor(30 / (0.8 + wave * 0.07)));
        generateWave();
        // bonus de survie : +200 points par vague franchie
        score += 200;
        updateScoreUI();
        saveHighScore();
      }

      // ----- Tir du joueur -----
      function shootLaser() {
        if (!gameRunning || isPaused) return;
        lasers.push({
          x: player.x + player.width / 2 - 3,
          y: player.y - 8,
          w: 5,
          h: 14,
          active: true
        });
      }

      // ----- Mise à jour des entités -----
      function updateLasers() {
        for (let i = 0; i < lasers.length; i++) {
          lasers[i].y -= 7;
          if (lasers[i].y + lasers[i].h < 0 || lasers[i].y > H) {
            lasers.splice(i, 1);
            i--;
          }
        }
      }

      function updateInvadersMovement() {
        if (!gameRunning || isPaused) return;
        if (invaders.length === 0) {
          advanceWave();
          return;
        }

        // déplacement périodique selon invaderMoveInterval
        invaderMoveCounter++;
        if (invaderMoveCounter >= invaderMoveInterval) {
          invaderMoveCounter = 0;
          let needDrop = false;
          // Vérifier si un ennemi touche les bords
          for (let inv of invaders) {
            let newX = inv.x + invaderDirection * 24;
            if (newX + inv.w >= W - 15 || newX <= 15) {
              needDrop = true;
              break;
            }
          }
          if (needDrop) {
            // changement direction et descente
            invaderDirection *= -1;
            for (let inv of invaders) {
              inv.y += 12 + Math.floor(wave / 5);
            }
          } else {
            for (let inv of invaders) {
              inv.x += invaderDirection * 22;
            }
          }
        }
      }

      // collisions lasers vs envahisseurs (système de points + hp)
      function handleCollisions() {
        for (let i = 0; i < lasers.length; i++) {
          let laser = lasers[i];
          let hitIndex = -1;
          for (let j = 0; j < invaders.length; j++) {
            let inv = invaders[j];
            if (laser.x + laser.w > inv.x && laser.x < inv.x + inv.w &&
              laser.y + laser.h > inv.y && laser.y < inv.y + inv.h) {
              hitIndex = j;
              break;
            }
          }
          if (hitIndex !== -1) {
            let target = invaders[hitIndex];
            target.hp -= 1;
            lasers.splice(i, 1);
            i--;
            if (target.hp <= 0) {
              // ajouter des points
              score += target.points;
              updateScoreUI();
              saveHighScore();
              // ajouter explosion
              explosions.push({ x: target.x + target.w / 2, y: target.y + target.h / 2, timer: 8 });
              invaders.splice(hitIndex, 1);
              // Si plus d'envahisseurs => on avance vague (déclenché dans update)
            } else {
              // ennemi touché mais pas détruit : feedback explosion légère
              explosions.push({ x: target.x + target.w / 2, y: target.y + target.h / 2, timer: 4 });
            }
          }
        }
      }

      // vérifier si un envahisseur atteint le joueur ou le sol
      function checkGameOverCondition() {
        if (!gameRunning || isPaused) return false;
        for (let inv of invaders) {
          // collision directe avec vaisseau
          if (inv.x < player.x + player.width && inv.x + inv.w > player.x &&
            inv.y < player.y + player.height && inv.y + inv.h > player.y) {
            gameRunning = false;
            setPaused(false);
            canvas.style.cursor = 'default';
            return true;
          }
          // si un ennemi dépasse la ligne de défense (trop bas)
          if (inv.y + inv.h >= H - 35) {
            gameRunning = false;
            setPaused(false);
            canvas.style.cursor = 'default';
            return true;
          }
        }
        return false;
      }

      // spawn aléatoire de renforts (augmente la difficulté en continu)
      function dynamicReinforcement() {
        if (!gameRunning || isPaused) return;
        // plus le wave est haut, plus la probabilité d'envoyer des renforts est élevée
        let reinforcementChance = 0.005 + (wave * 0.003);
        if (invaders.length > 0 && Math.random() < reinforcementChance) {
          let side = Math.random() < 0.5 ? -1 : 1;
          let newX = (side === -1) ? 20 : W - 70;
          let newY = 30 + Math.random() * 70;
          let extraPoints = 80 + Math.floor(wave * 8);
          let extraHp = (wave >= 4 && Math.random() < 0.4) ? 2 : 1;
          let color = (extraHp > 1) ? "#f9a26c" : "#ff6f91";
          invaders.push({
            x: newX, y: newY, w: 34, h: 28, hp: extraHp, maxHp: extraHp,
            points: extraPoints, color: color, type: "reinforce"
          });
        }
      }

      // mise à jour des explosions (animation)
      function updateExplosions() {
        for (let i = 0; i < explosions.length; i++) {
          explosions[i].timer--;
          if (explosions[i].timer <= 0) {
            explosions.splice(i, 1);
            i--;
          }
        }
      }

      // déplacement joueur (clavier)
      let leftPressed = false;
      let rightPressed = false;
      let spacePressed = false;
      let lastShootFrame = 0;

      function handleInput() {
        if (!gameRunning || isPaused) return;
        if (leftPressed && player.x > 10) player.x -= player.speed;
        if (rightPressed && player.x + player.width < W - 10) player.x += player.speed;

        if (spacePressed && shotCooldown <= 0) {
          shootLaser();
          shotCooldown = SHOT_DELAY_FRAMES;
        }
        if (shotCooldown > 0) shotCooldown--;
      }

      // ---------- RENDERING PIXEL ART RÉTRO ----------
      function drawPlayer() {
        ctx.save();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#3eff9e";
        ctx.fillRect(player.x, player.y, player.width, player.height);
        // détails cockpit
        ctx.fillStyle = "#ccffdd";
        ctx.fillRect(player.x + 8, player.y - 4, 12, 6);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(player.x + 12, player.y + 6, 4, 8);
        ctx.fillStyle = "#fa5e57";
        ctx.fillRect(player.x + 4, player.y + 16, 6, 6);
        ctx.fillRect(player.x + player.width - 10, player.y + 16, 6, 6);
        ctx.fillStyle = "#242038";
        ctx.fillRect(player.x + 12, player.y + 20, 4, 5);
      }

      function drawLaser() {
        for (let l of lasers) {
          ctx.fillStyle = "#ffd966";
          ctx.fillRect(l.x, l.y, l.w, l.h);
          ctx.fillStyle = "yellow";
          ctx.fillRect(l.x + 1, l.y + 2, 2, l.h - 4);
        }
      }

      function drawInvaders() {
        for (let inv of invaders) {
          ctx.fillStyle = inv.color;
          ctx.fillRect(inv.x, inv.y, inv.w, inv.h);
          // yeux pixel
          ctx.fillStyle = "white";
          ctx.fillRect(inv.x + 6, inv.y + 6, 6, 6);
          ctx.fillRect(inv.x + inv.w - 12, inv.y + 6, 6, 6);
          ctx.fillStyle = "#000000";
          ctx.fillRect(inv.x + 8, inv.y + 8, 2, 4);
          ctx.fillRect(inv.x + inv.w - 10, inv.y + 8, 2, 4);
          if (inv.hp > 1) {
            ctx.fillStyle = "#ffaa44";
            ctx.fillRect(inv.x + 5, inv.y - 6, inv.w - 10, 5);
            ctx.fillStyle = "#ff4455";
            let percent = inv.hp / inv.maxHp;
            ctx.fillRect(inv.x + 5, inv.y - 6, (inv.w - 10) * percent, 5);
          }
          // petit détail antenna
          ctx.fillStyle = "#aa88ff";
          ctx.fillRect(inv.x + inv.w / 2 - 2, inv.y - 4, 4, 5);
        }
      }

      function drawExplosions() {
        for (let exp of explosions) {
          let intensity = exp.timer;
          ctx.fillStyle = `rgba(255, 100, 30, ${0.5 + intensity / 12})`;
          ctx.fillRect(exp.x - 6, exp.y - 6, 12, 12);
          ctx.fillStyle = `rgba(255, 220, 80, ${0.7})`;
          ctx.fillRect(exp.x - 3, exp.y - 3, 6, 6);
        }
      }

      function drawUIandEffects() {
        if (isPaused) {
          ctx.fillStyle = "rgba(0, 0, 0, 0.62)";
          ctx.fillRect(0, 0, W, H);
          ctx.font = "bold 42px 'Courier New'";
          ctx.fillStyle = "#7fffd4";
          ctx.shadowBlur = 0;
          ctx.fillText("⏸ PAUSE", W / 2 - 105, H / 2 - 20);
          ctx.font = "20px monospace";
          ctx.fillStyle = "#f0ff70";
          ctx.fillText("Appuyez sur P ou ECHAP pour reprendre", W / 2 - 205, H / 2 + 35);
        }

        if (!gameRunning) {
          ctx.font = "bold 38px 'Courier New'";
          ctx.fillStyle = "#ff3377";
          ctx.shadowBlur = 0;
          ctx.fillText("💀 GAME OVER 💀", W / 2 - 165, H / 2 - 35);
          ctx.font = "22px monospace";
          ctx.fillStyle = "#caffbf";
          ctx.fillText("Appuyez sur RESTART", W / 2 - 100, H / 2 + 40);
        }

        // pixel border effet scanline
        ctx.strokeStyle = "#0fefa8";
        ctx.lineWidth = 2;
        ctx.strokeRect(4, 4, W - 8, H - 8);
      }

      // générer effet néon/background étoiles
      let stars = [];
      for (let i = 0; i < 150; i++) stars.push({ x: Math.random() * W, y: Math.random() * H, size: 1 + Math.random() * 2 });
      function drawStars() {
        for (let s of stars) {
          ctx.fillStyle = `rgba(255,240,200,${0.3 + Math.sin(Date.now() * 0.002 + s.x) * 0.2})`;
          ctx.fillRect(s.x, s.y, s.size, s.size);
        }
      }

      function drawWaveBar() {
        let progress = (invaders.length > 0) ? 1 - (invaders.length / (invaders.length + 1)) : 1;
        ctx.fillStyle = "#222244";
        ctx.fillRect(20, 15, 180, 12);
        ctx.fillStyle = "#6affb0";
        let rem = invaders.length;
        let maxEnemiesStart = Math.min(28, 8 + Math.floor(wave / 3));
        let ratio = 1 - (rem / (maxEnemiesStart + 0.1));
        ctx.fillRect(20, 15, 180 * Math.min(1, Math.max(0, ratio)), 12);
        ctx.fillStyle = "#d0ffcc";
        ctx.font = "12px monospace";
        ctx.fillText("INVADERS:" + rem, 20, 30);
      }

      // ---------- BOUCLE PRINCIPALE ----------
      function updateGame() {
        if (gameRunning && !isPaused) {
          handleInput();
          updateLasers();
          updateInvadersMovement();
          handleCollisions();
          dynamicReinforcement();   // renforts pour difficulté infinie
          checkGameOverCondition();  // game over si collision
          updateExplosions();
          // Sauvegarde score si record
          if (score > highScore) saveHighScore();
          updateScoreUI();
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = "#010018";
        ctx.fillRect(0, 0, W, H);
        drawStars();
        drawInvaders();
        drawPlayer();
        drawLaser();
        drawExplosions();
        drawWaveBar();
        drawUIandEffects();
        // info difficulté visuelle (vitesse vague)
        ctx.font = "12px monospace";
        ctx.fillStyle = "#71ffd9";
        ctx.fillText("WAVE " + wave + "  |  SPEED LV" + Math.min(10, Math.floor(wave / 2)), W - 140, 28);
      }

      function gameLoop() {
        updateGame();
        draw();
        requestId = requestAnimationFrame(gameLoop);
      }

      // ---------- GESTION CLAVIER ----------
      function setPaused(value) {
        if (!gameRunning) return;
        isPaused = value;
        leftPressed = false;
        rightPressed = false;
        spacePressed = false;
        canvas.style.cursor = isPaused ? 'default' : 'none';
        pauseButton.innerText = isPaused ? '▶ REPRENDRE' : '⏸ PAUSE';
      }

      function togglePause() {
        setPaused(!isPaused);
      }

      function keyHandler(e, value) {
        if (value && (e.key === 'p' || e.key === 'P' || e.key === 'Escape')) {
          if (!e.repeat) togglePause();
          e.preventDefault();
        } else if (e.key === 'ArrowLeft' || e.key === 'Left' || e.key === 'a') {
          leftPressed = value;
          e.preventDefault();
        } else if (e.key === 'ArrowRight' || e.key === 'Right' || e.key === 'd') {
          rightPressed = value;
          e.preventDefault();
        } else if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'Space' || e.key === 'Up') {
          spacePressed = value;
          e.preventDefault();
          if (value && gameRunning && !isPaused && shotCooldown <= 0) {
            shootLaser();
            shotCooldown = SHOT_DELAY_FRAMES;
          }
        }
      }

      window.addEventListener('keydown', (e) => {
        keyHandler(e, true);
        if (e.key === ' ' || e.key === 'Space' || e.key === 'ArrowUp') e.preventDefault();
      });
      window.addEventListener('keyup', (e) => keyHandler(e, false));

      // restart via bouton
      document.getElementById('restartButton').addEventListener('click', () => {
        // reset complet
        initGame();
        gameRunning = true;
        setPaused(false);
        leftPressed = false;
        rightPressed = false;
        spacePressed = false;
        shotCooldown = 0;
      });

      pauseButton.addEventListener('click', togglePause);

      // initialisation finale
      loadHighScore();
      initGame();
      canvas.style.cursor = 'none';
      gameLoop();
    })();
  </script>
</body>

</html>
